name = "ai-tool-chat-worker"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[observability]
enabled = true

# Durable Objects 配置
[[durable_objects.bindings]]
name = "CHUNK_STORAGE"
class_name = "ChunkStorage"

# Durable Objects 迁移配置
[[migrations]]
tag = "v1"
new_classes = ["ChunkStorage"]

# 自定义域名路由配置
[[routes]]
pattern = "api.i-tool-chat.store"
custom_domain = true
